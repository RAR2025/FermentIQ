services:
  - type: web
    name: fermentiq-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py migrate --run-syncdb && python manage.py collectstatic --noinput"
    startCommand: "cd backend && gunicorn fermentiq_backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11"

# Note: The dashboard is intended to be deployed on Streamlit Cloud (Streamlit Sharing)
# Keep the `dashboard/` folder and `dashboard/requirements.txt` as-is so Streamlit can deploy directly.
